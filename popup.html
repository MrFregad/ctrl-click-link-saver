<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 18px;
      border-bottom: 1px solid #2a2a40;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 22px; }

    .header-text h2 {
      font-size: 14px;
      font-weight: 600;
      color: #c5b8ff;
      letter-spacing: 0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: #666680;
      margin-top: 2px;
    }

    .count-badge {
      margin-left: auto;
      background: #5c4aee;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid #1e1e2e;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-export {
      background: #5c4aee;
      color: white;
    }

    .btn-export:hover { background: #6d5bf0; }

    .btn-clear {
      background: #2a1a2e;
      color: #cc5566;
      border: 1px solid #3a1a2e;
    }

    .btn-clear:hover { background: #3a1a2e; }

    .links-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .links-list::-webkit-scrollbar { width: 4px; }
    .links-list::-webkit-scrollbar-track { background: #0f0f13; }
    .links-list::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 2px; }

    .link-item {
      padding: 9px 18px;
      border-bottom: 1px solid #15151f;
      cursor: pointer;
      transition: background 0.1s;
    }

    .link-item:hover { background: #16161f; }

    .link-title {
      font-size: 12px;
      color: #c5b8ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .link-url {
      font-size: 10px;
      color: #44aaff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-time {
      font-size: 9px;
      color: #44444f;
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #44444f;
    }

    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 12px; line-height: 1.5; }
    .empty-state b { color: #666680; }

    .footer {
      padding: 8px 18px;
      border-top: 1px solid #1e1e2e;
      font-size: 10px;
      color: #33333f;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔗</div>
    <div class="header-text">
      <h2>Ctrl+Click Link Saver</h2>
      <p>Собирает ссылки без открытия вкладок</p>
    </div>
    <div class="count-badge" id="count">0</div>
  </div>

  <div class="actions">
    <button class="btn-export" id="exportBtn">💾 Скачать .txt файл</button>
    <button class="btn-clear" id="clearBtn">🗑 Очистить</button>
  </div>

  <div class="links-list" id="linksList">
    <div class="empty-state">
      <div class="icon">🖱️</div>
      <p>Держи <b>Ctrl</b> и кликай на ссылки —<br>они будут собираться здесь,<br>без открытия вкладок.</p>
    </div>
  </div>

  <div class="footer">Файл сохраняется в папку Загрузки</div>

  <script src="popup.js"></script>
</body>
</html>
